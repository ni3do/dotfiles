source-file -q ~/.config/tmux/tmux.reset.conf
set-option -g terminal-overrides ',xterm-256color:RGB'

set -g prefix C-Space
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g default-terminal "tmux-256color"
set -g xterm-keys on             # enable modified keys (e.g., Ctrl+Backspace) passthrough
set -g default-shell /bin/zsh
setw -g mode-keys vi
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set -g mouse on
set -g assume-paste-time 1        # Treat rapid key sequences as paste for better handling

# Update SSH_AUTH_SOCK and KRB5CCNAME when creating new sessions/windows
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION DISPLAY KRB5CCNAME"

# Activity & Bell Monitoring (for multi-project Claude Code workflow)
setw -g monitor-activity on       # Highlight windows with activity
set -g visual-activity off        # Don't show messages, just highlight in status line
set -g activity-action other      # Highlight in status line but don't switch
set -g visual-bell off            # Don't flash screen for bells
set -g bell-action other          # Mark window with bell indicator
setw -g monitor-bell on           # Monitor for bells in windows
setw -g window-status-activity-style 'fg=yellow,bold'
setw -g window-status-bell-style 'fg=red,bold'

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'alexwforsythe/tmux-which-key'

# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'sainnhe/tmux-fzf'

set -g @plugin 'omerxx/tmux-sessionx'
# set -g @sessionx-bind 'o'  # replaced by custom tmux-session-picker
set -g @sessionx-bind 'O'    # keep sessionx on Shift+O as fallback
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-x-path '~/repo/simonwachter-dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-filter-current 'false'

# Enhanced: Search in common project directories
set -g @sessionx-custom-paths '~/repo,~/projects,~/work'
set -g @sessionx-custom-paths-subdirectories 'true'  # Recursively search subdirectories

# Preview settings (if supported by your version)
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'

set -g @plugin 'omerxx/tmux-floax'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

# set -g @plugin 'fcsonline/tmux-thumbs'

set -g @plugin 'catppuccin/tmux'
# Configure the catppuccin plugin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"

# Automatic window renaming for better context
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g allow-rename on

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_session}"
set -ag status-left "#{E:@catppuccin_status_directory}"

set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_application}"

# Window status format (shows activity/bell indicators automatically)
# Activity flag: !, Bell flag: ~, Content activity: #
setw -g window-status-format "#I:#W#{?window_flags,#{window_flags}, }"
setw -g window-status-current-format "#I:#W#{?window_flags,#{window_flags}, }"

# ──────────────────────────────────────────────────────────────────────────────
# Custom Keybindings: Project Jumping
# ──────────────────────────────────────────────────────────────────────────────

# Add project keybindings as needed:
# bind-key D if-shell "tmux has-session -t proj:dotfiles" "switch-client -t proj:dotfiles"
# bind-key 1 if-shell "tmux has-session -t proj:work1" "switch-client -t proj:work1"
# bind-key 2 if-shell "tmux has-session -t proj:work2" "switch-client -t proj:work2"

# ──────────────────────────────────────────────────────────────────────────────
# Session Management
# ──────────────────────────────────────────────────────────────────────────────
# Switch to last used session (Prefix + Shift+L)
bind-key L switch-client -l

# Kill current session with confirmation (Prefix + Shift+X)
bind-key X confirm-before -p "Kill session #S? (y/n)" kill-session

# ──────────────────────────────────────────────────────────────────────────────
# Quick Window Switching
# ──────────────────────────────────────────────────────────────────────────────
# Quick jump to windows 1, 2, 3 (useful for 3-window session layout)
bind-key 1 select-window -t :=1
bind-key 2 select-window -t :=2
bind-key 3 select-window -t :=3

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Custom session picker (after TPM to override plugin bindings)
bind-key o display-popup -E -w 80% -h 80% "ts"
