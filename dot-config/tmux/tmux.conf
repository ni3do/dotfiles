setw -g window-status-current-format "#I:#W#{?window_flags,#{window_flags}, }"

# ─────────────────────────────────────────────────────────────────────────────
# Custom Keybindings: Project Jumping
# ──────────────────────────────────────────────────────────────────────────────

# Add project keybindings as needed:
# bind-key D if-shell "tmux has-session -t proj:dotfiles" "switch-client -t proj:dotfiles"
# bind-key 1 if-shell "tmux has-session -t proj:work1" "switch-client -t proj:work1"
# bind-key 2 if-shell "tmux has-session -t proj:work2" "switch-client -t proj:work2"

# ──────────────────────────────────────────────────────────────────────────────
# Session Management
# ──────────────────────────────────────────────────────────────────────────────
# Switch to last used session (Prefix + Shift+L)
bind-key L switch-client -l

# Kill current session with confirmation (Prefix + Shift+X)
bind-key X confirm-before -p "Kill session #S? (y/n)" kill-session

# ──────────────────────────────────────────────────────────────────────────────
# Quick Window Switching
# ──────────────────────────────────────────────────────────────────────────────
# Quick jump to windows 1, 2, 3 (useful for 3-window session layout)
bind-key 1 select-window -t :=1
bind-key 2 select-window -t :=2
bind-key 3 select-window -t :=3

# ──────────────────────────────────────────────────────────────────────────────
# Focus Tracking (hq)
# ──────────────────────────────────────────────────────────────────────────────
# Managed by hq: session-switch tracking + heartbeat. Install via: hq focus-setup-tmux
source-file -q ~/.config/hq/tmux-hooks.conf

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Custom session picker (after TPM to override plugin bindings)
bind-key o display-popup -E -w 80% -h 80% "ts"
